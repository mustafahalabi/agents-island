name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Build app bundle
        run: |
          VERSION="${GITHUB_REF_NAME#v}" ./make-app.sh --no-launch

      - name: Zip
        run: |
          ditto -c -k --keepParent dist/AgentsIsland.app AgentsIsland.zip
          shasum -a 256 AgentsIsland.zip > AgentsIsland.zip.sha256

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            AgentsIsland.zip AgentsIsland.zip.sha256 \
            --title "Agents Island $GITHUB_REF_NAME" \
            --generate-notes \
            --notes "$(printf '%s\n' \
              '**Easiest install (builds locally, no Gatekeeper fuss):**' \
              '```sh' \
              'curl -fsSL https://raw.githubusercontent.com/mustafahalabi/agents-island/main/install.sh | bash' \
              '```' \
              '' \
              '**Or use the attached zip:** unzip, drag AgentsIsland.app to /Applications, then **right-click → Open** the first time (the build is not notarized).')"
