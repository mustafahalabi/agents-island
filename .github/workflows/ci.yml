name: CI

# Releases are cut locally with scripts/release.sh (signing + notarization
# need the Developer ID certificate, which lives in the maintainer's
# keychain). CI just proves every push builds and the logic tests pass.
on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: build
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v7
      - name: Build app bundle
        run: ./make-app.sh --no-launch

  test:
    name: test
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v7
      - name: Run logic tests
        run: ./scripts/run-tests.sh
