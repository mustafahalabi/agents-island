name: Feature request
description: Suggest an improvement or a new capability
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the situation you're in, not just the feature you want.
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: What would you like to happen?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives you've considered

  - type: checkboxes
    id: constraints
    attributes:
      label: Project constraints
      description: Agents Island is local-only and dependency-free by design.
      options:
        - label: This doesn't require sending any data off the user's machine
          required: true
        - label: I've checked existing issues for a duplicate
          required: true
